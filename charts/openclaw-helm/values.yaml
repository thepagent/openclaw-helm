image:
  repository: ghcr.io/openclaw/openclaw
  tag: "2026.3.31"
  digest: ""    # if set, overrides tag (e.g. sha256:abc123...)
  pullPolicy: IfNotPresent

replicas: 1

# strategy controls the deployment update strategy
# Recreate is required for RWO PVC (default on most cloud providers) to avoid
# Multi-Attach errors during helm upgrade. Override to RollingUpdate only if
# your StorageClass supports RWX (ReadWriteMany).
strategy:
  type: Recreate

resources:
  limits:
    cpu: 2
    memory: 3Gi
  requests:
    cpu: 200m
    memory: 512Mi

# nodeOptions configures Node.js runtime options for the gateway container.
# maxOldSpaceSize sets --max-old-space-size (in MiB) via NODE_OPTIONS,
# causing Node.js to exit gracefully before the kernel OOM killer fires.
# Set to 0 to disable.
nodeOptions:
  maxOldSpaceSize: 2560

service:
  type: ClusterIP
  port: 18789

persistence:
  enabled: true
  storageClass: ""
  size: 10Gi

config:
  gateway:
    port: 18789
    mode: local
    controlUi:
      allowedOrigins:
        - "*"
    trustedProxies:
      - "10.0.0.1"
  
  browser:
    enabled: false
  
  agents:
    defaults:
      workspace: /home/node/.openclaw/workspace
      userTimezone: UTC
      timeoutSeconds: 600
      maxConcurrent: 1
    list:
      - id: main
        default: true
        identity:
          name: OpenClaw
          emoji: "🦞"
  
  session:
    scope: per-sender
    store: /home/node/.openclaw/sessions
    reset:
      mode: idle
      idleMinutes: 60
  
  logging:
    level: info
    consoleLevel: info
    consoleStyle: compact
    redactSensitive: tools
  
  tools:
    profile: full
    web:
      search:
        enabled: false
      fetch:
        enabled: true

skills:
  - weather
  - gog

gateway:
  token:
    generate: true    # auto-generate gateway token Secret on install, retained on uninstall
    secretName: ""    # override secret name if generate=false

env: {}
  # EXAMPLE_VAR: "value"

# envFrom allows injecting environment variables from Secrets or ConfigMaps
# Example:
# envFrom:
#   - secretRef:
#       name: openclaw-api-keys
#   - configMapRef:
#       name: openclaw-config
envFrom: []

# nodeSelector constrains the pod to nodes with matching labels
# Example: { disktype: ssd }
nodeSelector: {}

# tolerations allow scheduling onto tainted nodes
tolerations: []

# affinity defines advanced node/pod scheduling rules
affinity: {}

# podSecurityContext sets pod-level security attributes (e.g. fsGroup for volume permissions)
podSecurityContext: {}
# podSecurityContext:
#   fsGroup: 1000

# extraContainers adds sidecar containers to the pod
extraContainers: []

# extraVolumeMounts adds additional volume mounts to the main container
extraVolumeMounts: []

# extraVolumes adds additional volumes to the pod
extraVolumes: []
