apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openclaw-helm.fullname" . }}
  labels:
    {{- include "openclaw-helm.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  {{- with .Values.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "openclaw-helm.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ .Values.config | toJson | sha256sum }}
      labels:
        {{- include "openclaw-helm.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
      - name: init-config
        image: "{{ include "openclaw-helm.image" . }}"
        command:
        - sh
        - -c
        - |
          mkdir -p /home/node/.openclaw
          [ -f /home/node/.openclaw/openclaw.json ] || cp /config/openclaw.json /home/node/.openclaw/openclaw.json
          # Sync gateway.remote.token to match OPENCLAW_GATEWAY_TOKEN (if set)
          # gateway reads auth token from env var first (env-first precedence), so auth.token in config is not needed
          if [ -n "$OPENCLAW_GATEWAY_TOKEN" ]; then
            node -e "
              const fs = require('fs');
              const p = '/home/node/.openclaw/openclaw.json';
              const c = JSON.parse(fs.readFileSync(p));
              c.gateway = c.gateway || {};
              c.gateway.remote = c.gateway.remote || {};
              c.gateway.remote.token = process.env.OPENCLAW_GATEWAY_TOKEN;
              fs.writeFileSync(p, JSON.stringify(c, null, 2));
            "
          fi
        env:
        - name: OPENCLAW_GATEWAY_TOKEN
          valueFrom:
            secretKeyRef:
              {{- if .Values.gateway.token.generate }}
              name: {{ include "openclaw-helm.fullname" . }}-gateway-token
              {{- else }}
              name: {{ .Values.gateway.token.secretName }}
              {{- end }}
              key: token
              optional: true
        volumeMounts:
        - name: config
          mountPath: /config
        - name: data
          mountPath: /home/node/.openclaw
        - name: tmp
          mountPath: /tmp
      
      - name: init-skills
        image: "{{ include "openclaw-helm.image" . }}"
        command:
        - sh
        - -c
        - |
          mkdir -p /home/node/.openclaw/workspace/skills
          cd /home/node/.openclaw/workspace
          {{- range .Values.skills }}
          if [ ! -d "skills/{{ . }}" ]; then
            npx -y clawhub install "{{ . }}" --no-input || true
          fi
          {{- end }}
        env:
        - name: HOME
          value: /tmp
        - name: NPM_CONFIG_CACHE
          value: /tmp/.npm
        volumeMounts:
        - name: data
          mountPath: /home/node/.openclaw
        - name: tmp
          mountPath: /tmp
      
      containers:
      - name: main
        image: "{{ include "openclaw-helm.image" . }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
        - node
        - dist/index.js
        args:
        - gateway
        - --port
        - "18789"
        ports:
        - containerPort: 18789
          protocol: TCP
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - "curl -f http://127.0.0.1:18789/ || exit 1"
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - "curl -f http://127.0.0.1:18789/ || exit 1"
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        startupProbe:
          exec:
            command:
            - sh
            - -c
            - "curl -f http://127.0.0.1:18789/ || exit 1"
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 30
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        {{- if or .Values.env (and .Values.nodeOptions .Values.nodeOptions.maxOldSpaceSize) }}
        env:
        {{- if and .Values.nodeOptions .Values.nodeOptions.maxOldSpaceSize }}
        - name: NODE_OPTIONS
          value: "--max-old-space-size={{ .Values.nodeOptions.maxOldSpaceSize }}"
        {{- end }}
        {{- range $key, $value := .Values.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- end }}
        envFrom:
        {{- if .Values.gateway.token.generate }}
        - secretRef:
            name: {{ include "openclaw-helm.fullname" . }}-gateway-token
        {{- else if .Values.gateway.token.secretName }}
        - secretRef:
            name: {{ .Values.gateway.token.secretName }}
        {{- end }}
        {{- with .Values.envFrom }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
        volumeMounts:
        - name: data
          mountPath: /home/node/.openclaw
        - name: tmp
          mountPath: /tmp
        - name: bash-aliases
          mountPath: /home/node/.bash_aliases
          subPath: bash_aliases
        {{- with .Values.extraVolumeMounts }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.extraContainers }}
        {{- toYaml . | nindent 6 }}
      {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
      - name: config
        configMap:
          name: {{ include "openclaw-helm.fullname" . }}
      - name: bash-aliases
        configMap:
          name: {{ include "openclaw-helm.fullname" . }}
      - name: data
        persistentVolumeClaim:
          claimName: {{ include "openclaw-helm.fullname" . }}
      - name: tmp
        emptyDir: {}
      {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 6 }}
      {{- end }}
