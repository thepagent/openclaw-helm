apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openclaw-helm.fullname" . }}
  labels:
    {{- include "openclaw-helm.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "openclaw-helm.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "openclaw-helm.selectorLabels" . | nindent 8 }}
    spec:
      initContainers:
      - name: init-config
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        command:
        - sh
        - -c
        - |
          mkdir -p /home/node/.openclaw
          [ -f /home/node/.openclaw/openclaw.json ] || cp /config/openclaw.json /home/node/.openclaw/openclaw.json
        volumeMounts:
        - name: config
          mountPath: /config
        - name: data
          mountPath: /home/node/.openclaw
        - name: tmp
          mountPath: /tmp

      - name: init-skills
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        command:
        - sh
        - -c
        - |
          mkdir -p /home/node/.openclaw/workspace/skills
          cd /home/node/.openclaw/workspace
          {{- range .Values.skills }}
          if [ ! -d "skills/{{ . }}" ]; then
            npx -y clawhub install "{{ . }}" --no-input || true
          fi
          {{- end }}
        env:
        - name: HOME
          value: /tmp
        - name: NPM_CONFIG_CACHE
          value: /tmp/.npm
        volumeMounts:
        - name: data
          mountPath: /home/node/.openclaw
        - name: tmp
          mountPath: /tmp

      {{- if .Values.config.browser.enabled }}
      - name: install-chrome-deps
        image: "{{ .Values.browser.depsImage | default "debian:12" }}"
        securityContext:
          runAsUser: 0
        command:
        - sh
        - -c
        - |
          apt-get update -qq && apt-get install -y -qq \
            libxcb-shm0 libx11-xcb1 libx11-6 libxcb1 libxext6 libxrandr2 \
            libxcomposite1 libxcursor1 libxdamage1 libxfixes3 libxi6 libgtk-3-0 \
            libpangocairo-1.0-0 libpango-1.0-0 libatk1.0-0 libcairo-gobject2 \
            libcairo2 libgdk-pixbuf-2.0-0 libxrender1 libasound2t64 libfreetype6 \
            libfontconfig1 libdbus-1-3 libnss3 libnspr4 libatk-bridge2.0-0 \
            libdrm2 libxkbcommon0 libatspi2.0-0 libcups2 libxshmfence1 libgbm1 \
            fonts-noto-cjk fonts-noto-color-emoji \
            2>&1 && \
          cp -a /usr/lib/x86_64-linux-gnu/. /chrome-libs/ && \
          cp -a /usr/share/fonts/. /chrome-fonts/ && \
          cp -a /etc/fonts/. /chrome-fontconfig/ && \
          echo "Chrome dependencies and CJK fonts installed"
        volumeMounts:
        - name: chrome-libs
          mountPath: /chrome-libs
        - name: chrome-fonts
          mountPath: /chrome-fonts
        - name: chrome-fontconfig
          mountPath: /chrome-fontconfig
      {{- end }}

      containers:
      - name: main
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
        - node
        - dist/index.js
        args:
        - gateway
        - --port
        - "18789"
        ports:
        - containerPort: 18789
          protocol: TCP
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - "curl -f http://127.0.0.1:18789/ || exit 1"
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - "curl -f http://127.0.0.1:18789/ || exit 1"
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        startupProbe:
          exec:
            command:
            - sh
            - -c
            - "curl -f http://127.0.0.1:18789/ || exit 1"
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 30
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        env:
        {{- if .Values.config.browser.enabled }}
        - name: LD_LIBRARY_PATH
          value: /chrome-libs
        {{- end }}
        {{- range $key, $value := .Values.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        envFrom:
        {{- if .Values.gateway.token.generate }}
        - secretRef:
            name: {{ include "openclaw-helm.fullname" . }}-gateway-token
        {{- else if .Values.gateway.token.secretName }}
        - secretRef:
            name: {{ .Values.gateway.token.secretName }}
        {{- end }}
        {{- with .Values.envFrom }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
        volumeMounts:
        - name: data
          mountPath: /home/node/.openclaw
        - name: tmp
          mountPath: /tmp
        - name: bash-aliases
          mountPath: /home/node/.bash_aliases
          subPath: bash_aliases
        {{- if .Values.config.browser.enabled }}
        - name: chrome-libs
          mountPath: /chrome-libs
        - name: chrome-fonts
          mountPath: /usr/share/fonts
        - name: chrome-fontconfig
          mountPath: /etc/fonts
        {{- end }}

      volumes:
      - name: config
        configMap:
          name: {{ include "openclaw-helm.fullname" . }}
      - name: bash-aliases
        configMap:
          name: {{ include "openclaw-helm.fullname" . }}
      - name: data
        persistentVolumeClaim:
          claimName: {{ include "openclaw-helm.fullname" . }}
      - name: tmp
        emptyDir: {}
      {{- if .Values.config.browser.enabled }}
      - name: chrome-libs
        emptyDir: {}
      - name: chrome-fonts
        emptyDir: {}
      - name: chrome-fontconfig
        emptyDir: {}
      {{- end }}
